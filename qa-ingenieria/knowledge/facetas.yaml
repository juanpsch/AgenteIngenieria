# Ejes ortogonales (facetas) + sus valores. Una familia declara sus coordenadas en `revision.facetas`
# y el resolvedor une las reglas de todas, con "lo más específico gana". Ver docs/PLAN_Taxonomia_Facetas.md.
#
# Editar acá es la forma de cambiar las decisiones de diseño (precedencia de ejes, política de conflicto)
# sin tocar código.

politica:
  conflicto_severidad: mas_especifico   # mas_especifico | mas_restrictivo (gana la severidad más alta)

ejes:                       # precedencia: MENOR número = MÁS específico (pisa al resto)
  proyecto:     { precedencia: 1 }
  organizacion: { precedencia: 2 }
  tipo:         { precedencia: 3 }
  disciplina:   { precedencia: 4 }
  jurisdiccion: { precedencia: 5 }

valores:                    # por eje: valor -> {nombre, padre?, normas?, requisitos?, excluir?}
  tipo:
    diagrama:   { nombre: "Diagramas" }
    # familia_generica: de dónde HEREDA ejemplos un subgrupo nuevo (cold-start) hasta tener los propios.
    # severidad: override por faceta (lo más específico gana). "declarar la norma" importa en una memoria
    # (mayor) pero no en un plano/P&ID (menor) — y una familia puntual puede overridearlo en su revision.
    pid:        { nombre: "P&ID", padre: diagrama, normas: [iram-instrumentacion], familia_generica: pid_instrumentacion, severidad: { norma_declarada: menor } }
    plano:      { nombre: "Plano (dibujo técnico)", normas: [iram-dibujo], familia_generica: plano_generico, severidad: { norma_declarada: menor } }
    memoria:    { nombre: "Memoria de cálculo", severidad: { norma_declarada: mayor } }
    # hoja_datos es GENÉRICO (agrupa); la norma específica (ASME VIII-1) la declara la familia de recipientes
    # en su revision.normas, no el tipo — así otras hojas de datos no heredan ASME por error.
    hoja_datos: { nombre: "Hoja de datos" }
    esquematico: { nombre: "Esquemático electrónico" }
  organizacion:
    camuzzi:    { nombre: "Camuzzi", normas: [camuzzi] }
    epa_bc:     { nombre: "EPA / Brown & Caldwell", normas: [epa-wwtp] }
  disciplina:
    instrumentacion: { nombre: "Instrumentación" }
    procesos:        { nombre: "Procesos" }
    electrica:       { nombre: "Eléctrica", normas: [aea-90364] }
    estructural:     { nombre: "Estructural", normas: [cirsoc-201] }
    mecanica:        { nombre: "Mecánica" }
    civil:           { nombre: "Civil" }
    electronica:     { nombre: "Electrónica" }
    arquitectura:    { nombre: "Arquitectura", normas: [plano-obra-vivienda] }
  jurisdiccion:
    AR: { nombre: "Argentina" }
    US: { nombre: "EE.UU." }
  proyecto:
    carem25: { nombre: "CAREM25" }
    panda:   { nombre: "PANDA" }
