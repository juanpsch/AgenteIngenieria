columnas_requeridas: []
caracteristicas:
- Cada hoja tiene un cajetín completo.
- Primera hoja incluye un índice con las secciones principales.
- Tabla de revisiones presente en cada documento.
- Incluye firmas digitales para aprobación, revisión y calidad.
nomenclatura: HD-CAREM25XT-[0-9]+-r[0-9]+.pdf
bloqueante:
- Formato de archivo no es PDF.
- Falta el cajetín completo en todas las hojas.
- No incluye un índice de contenido claro en la primera hoja.
- El código de documento no coincide con la nomenclatura esperada.
senales_reconocimiento: Documentos con cajetines detallados de Proyecto CAREM25, incluyendo
  revisiones, firmas digitales y contenido técnico orientado al sistema de refrigeración.
criterios_aceptacion: Cada documento debe tener un cajetín completo, un índice de
  secciones en la primera hoja y el contenido técnico detallado según los requisitos
  del proyecto CAREM25.
no_corresponde: Documentos que no detallan datos técnicos del sistema de refrigeración
  CAREM25 o carecen de los elementos formales como cajetines y firmas requeridas.
